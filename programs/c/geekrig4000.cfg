FEATURES {
	STARTADDRESS: default = $05CC;
}
MEMORY {
		ZP:			start = $0000, size = $0100, type = rw;
		MAIN:		file = %O, define = yes, start = $05CC, size = $0800;
		DATA:		start = $0DCC, size = $0234, type = rw;
}
SEGMENTS {
	ZEROPAGE:	load = ZP, type = zp;
	CODE:		load = MAIN, type = ro;
	BSS:		load = DATA, type = bss, define = yes;
	RODATA:		load = MAIN,     type = ro;
	DATA:		load = MAIN,     type = rw;
	LOWCODE:  load = MAIN, run = MAIN,     type = ro,  optional = yes;
	STARTUP:  load = MAIN, run = MAIN,     type = ro;
	ONCE:     load = MAIN, run = MAIN,     type = ro,  optional = yes;
	INIT:     load = MAIN, run = MAIN,     type = bss;
}
FEATURES {
	STARTADDRESS: default = $05CC;
	CONDES: type    = constructor,
			label   = __CONSTRUCTOR_TABLE__,
			count   = __CONSTRUCTOR_COUNT__,
			segment = ONCE;
	CONDES: type    = destructor,
			label   = __DESTRUCTOR_TABLE__,
			count   = __DESTRUCTOR_COUNT__,
			segment = RODATA;
}
