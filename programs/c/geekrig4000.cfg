memory {
	ZP: start = 0, size = 256, type = rw;
	RAM: start = $0200, size = $1000;
}
segments {
	# Look you, isn't there some way to auto-assign these? :D
	# Of course not.  Buuuut.... what should these be?  I mean,
	# the docs explain (kinda) what these are, but I have no
	# idea what should go here.  I know the memory map of the
	# system I'm targeting (lol) buuuuut....???????????????????
	# I mean, why can't I just tell it, "Here's where the code
	# in main() should start, here's ROM/RM you shouldn't touch"
	# and be done with it?  :D  I know, that probably borders on
	# asking for a miracle. :D

	ZEROPAGE:	load = ZP, type = zp;
    CODE: load = RAM, type = rw;
    DATA: load = RAM, type = rw;
    ONCE: load = RAM, type = rw;
    STARTUP: load = RAM, type = rw;
    INIT: load = RAM, type = rw;
}
symbols {
	# Not sure if this is needed - it compiles either way.
	# However, what has me in this endless loop of trial/error/DuckDuckGo
	# is that when I use "-t none" instead of a config file, it compiles
	# but can't set any variables (see invaders.c for an example).
	
	__STACKSIZE__:  type = weak, value = $100;	# REALLY small stack, for now

	# These mysterious symbols are not documented in the page describing the linker...
	# https://cc65.github.io/doc/ld65.html#ss5.11
	# So I'm not sure what they even mean.
	# I would also lump all the CONDES junk in there, and also
	# the symbols __CONSTRUCTOR_TABLE__ etc. in that mysterious
	# category too... constructors?  C isn't object-oriented! :D
	# To add another layer of wacky to the situation, the __MAIN*
	# ones (when commented out) throw errors referring to C64 stuff.
	# So... is the C64 some kind of default?  Where does it get C64?
	
	__MAIN_START__: type = weak, value = $05CC;
	__MAIN_SIZE__: type = weak, value = $0834;
	__BSS_RUN__: type = weak, value = $09FF;
	__BSS_SIZE__: type = weak, value = $0100;
}
FEATURES {

	# This one is self-explanatory :)
	STARTADDRESS: default = $05CC;

	# Alakazam, alakazoo, what the puck does this crap do?
	# lol okay seriously, the docs say...
	# "CONDES is used to tell the linker to emit module constructor/destructor tables."
	# I suppose that's where their references to OOP come in (under the hood
	# of the linker itself, it's probably all object-oriented C++).  Buuut...
	# Me lo puedes explicar en ingles - o en espanol - por favorrrr? :D
	# What is the significance of these "tables"?  I've done enough RDBS
	# stuff to know complex object hierarchies can be stored in tables, but
	# that has absolutely nothing to do with C (or even Assembly).  lol idk

	# HOWEVER: I think I found a missing puzzle piece...
	# https://cc65.github.io/doc/ca65.html
	# I've never needed to mess with ca65 - if i'm coding in Assembly I'm
	# using DASM - but there was a reference buried deeeeeeeeep in the docs
	# on the config file that I just kinda stumbled on while re-re-reading.
	# So next time, pour over that for a few years and see if it leads to
	# any meaningful intel on how this convoluted language works. :D
	
	CONDES: type    = constructor,
			label   = __CONSTRUCTOR_TABLE__,
			count   = __CONSTRUCTOR_COUNT__,
			segment = ONCE;
	CONDES: type    = destructor,
			label   = __DESTRUCTOR_TABLE__,
			count   = __DESTRUCTOR_COUNT__,
			segment = RODATA;
}
